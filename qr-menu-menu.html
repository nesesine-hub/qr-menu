<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bellacone — Menü</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ee; --warm: #f5e6d0; --brown: #5c3d2e;
    --accent: #c9663c; --soft: #e8d5c0; --text: #2d1f14;
    --muted: #8a6a56; --card: #fff9f3; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 100px; }

  .header { background: var(--brown); color: #fff; padding: 0.75rem 1.25rem; text-align: center; position: sticky; top: 0; z-index: 100; }
  .header img { height: 65px; width: auto; object-fit: contain; display: block; margin: 0 auto; }

  /* MASA BAR */
  .masa-bar { background: var(--warm); border-bottom: 1.5px solid var(--soft); padding: 0.75rem 1.25rem; display: flex; align-items: center; gap: 10px; }
  .masa-bar label { font-size: 13px; font-weight: 500; color: var(--muted); white-space: nowrap; }
  .masa-bar input { flex: 1; border: 1.5px solid var(--soft); border-radius: 10px; padding: 8px 12px; font-size: 14px; background: #fff; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; }
  .masa-bar input:focus { border-color: var(--accent); }
  .masa-pill { background: var(--brown); color: #fff; font-size: 12px; padding: 6px 12px; border-radius: 999px; white-space: nowrap; font-weight: 500; }

  /* EKRANLAR */
  .screen { display: none; }
  .screen.active { display: block; }

  /* KATEGORİ */
  .cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 1.25rem; }
  .cat-card { border-radius: var(--radius); overflow: hidden; cursor: pointer; border: 1.5px solid var(--soft); background: var(--card); transition: transform 0.2s, border-color 0.2s; aspect-ratio: 1; position: relative; }
  .cat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .cat-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cat-card .cat-no-img { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--warm); }
  .cat-label { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(44,24,10,0.85)); color: #fff; font-size: 15px; font-weight: 500; padding: 1.5rem 0.75rem 0.75rem; font-family: 'Playfair Display', serif; }

  /* DETAY HEADER */
  .detail-header { background: var(--warm); border-bottom: 1.5px solid var(--soft); padding: 0.75rem 1.25rem; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 99; }
  .back-btn { background: transparent; border: 2px solid var(--brown); border-radius: 10px; padding: 7px 16px; font-size: 14px; color: var(--brown); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 700; white-space: nowrap; }
  .back-btn:hover { background: var(--soft); }

  .detail-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--brown); flex: 1; }
  .section { padding: 1.25rem 1.25rem 0; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--brown); margin-bottom: 0.6rem; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--soft); }

  /* ÜRÜN GRID */
  .urun-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1rem; }
  .urun-card { background: var(--card); border: 1.5px solid var(--soft); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all 0.2s; }
  .urun-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .urun-card.selected { border-color: var(--accent); background: #fff1e8; }
  .urun-icon { font-size: 26px; margin-bottom: 6px; }
  .urun-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .urun-price { font-size: 12px; color: var(--accent); font-weight: 500; margin-top: 2px; }

  /* CHIPS */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
  .chip { border: 1.5px solid var(--soft); border-radius: 999px; padding: 6px 14px; font-size: 13px; cursor: pointer; background: var(--card); color: var(--text); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .chip:hover { border-color: var(--accent); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; }

  /* NOT */
  .not-input { width: 100%; border: 1.5px solid var(--soft); border-radius: 12px; padding: 10px 14px; font-size: 13px; background: var(--card); color: var(--text); font-family: 'DM Sans', sans-serif; resize: none; outline: none; margin-bottom: 1rem; }
  .not-input:focus { border-color: var(--accent); }

  /* ALT BAR */
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--brown); padding: 1rem 1.25rem; display: flex; align-items: center; gap: 10px; z-index: 200; }
  .sorun-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.3); background: transparent; color: #fff; font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .miktar-ctrl { display: flex; align-items: center; gap: 8px; }
  .miktar-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.3); background: transparent; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .miktar-btn:hover { background: rgba(255,255,255,0.1); }
  .miktar-val { color: #fff; font-size: 16px; font-weight: 500; min-width: 20px; text-align: center; }
  .sepete-ekle-btn { flex: 1; background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 12px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.15s; }
  .sepete-ekle-btn:hover { opacity: 0.9; }
  .sepete-ekle-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* SEPET BALONCUĞU */
  .sepet-fab { position: fixed; bottom: 90px; right: 20px; background: var(--brown); color: #fff; border: none; border-radius: 999px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; z-index: 300; display: none; align-items: center; gap: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .sepet-fab.visible { display: flex; }
  .sepet-badge { background: var(--accent); color: #fff; border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 700; }

  /* SEPET EKRANI */
  .sepet-item { background: var(--card); border: 1.5px solid var(--soft); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .sepet-item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .sepet-item-isim { font-size: 14px; font-weight: 500; color: var(--text); }
  .sepet-item-detay { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  .sepet-item-fiyat { font-size: 14px; font-weight: 600; color: var(--accent); white-space: nowrap; }
  .sepet-sil-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0; line-height: 1; }
  .sepet-toplam { background: var(--warm); border-radius: 12px; padding: 1rem; margin: 1rem 0; display: flex; justify-content: space-between; align-items: center; }
  .siparis-ver-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 0.5rem; }
  .siparis-ver-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .bos-sepet { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .bos-sepet-icon { font-size: 48px; margin-bottom: 1rem; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--card); border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 340px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; color: var(--brown); margin-bottom: 0.5rem; }
  .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 1rem; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1rem; }
  .modal-cancel { flex: 1; padding: 10px; border: 1.5px solid var(--soft); border-radius: 10px; background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .modal-send { flex: 1; padding: 10px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  .toast { position: fixed; top: 90px; left: 50%; transform: translateX(-50%); background: #2d1f14; color: #fff; padding: 10px 20px; border-radius: 999px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; }
  .empty-msg { font-size: 13px; color: var(--muted); font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <img src="${QR_MENU_CONFIG.logo}" alt="Bellacone" />
</div>

<div class="masa-bar">
  <label>Masa No</label>
  <input type="number" id="masa-input" placeholder="Örn: 5" min="1" max="99" />
  <span class="masa-pill" id="masa-pill">—</span>
</div>

<!-- ANA KATEGORİ -->
<div class="screen active" id="screen-home">
  <div class="cat-grid" id="cat-grid">
    <div class="loading">Yükleniyor...</div>
  </div>
</div>

<!-- KATEGORİ DETAY -->
<div class="screen" id="screen-detail">
  <div class="detail-header">
    <button class="back-btn" onclick="goHome()">← Geri</button>
    <span class="detail-title" id="detail-title"></span>
  </div>
  <div id="detail-content"></div>
</div>

<!-- SEPET EKRANI -->
<div class="screen" id="screen-sepet">
  <div class="detail-header">
    <span class="detail-title">🛒 Sepetim</span>
  </div>
  <div class="section" style="padding-top:1.25rem;">
    <div id="sepet-icerik"></div>
    <div class="sepet-toplam" id="sepet-toplam" style="display:none;">
      <span style="font-size:14px;font-weight:500;color:var(--brown);">Toplam</span>
      <span style="font-size:18px;font-weight:700;color:var(--accent);" id="sepet-toplam-tutar">0 ₺</span>
    </div>
    <textarea class="not-input" id="genel-not" rows="2" placeholder="Genel not (opsiyonel)..."></textarea>
    <button class="siparis-ver-btn" id="siparis-ver-btn" onclick="siparisVer()">Siparişi Tamamla</button>
  </div>
</div>

<!-- SEPET FAB -->
<button class="sepet-fab" id="sepet-fab" onclick="sepeteGit()">
  🛒 Sepet <span class="sepet-badge" id="sepet-badge">0</span>
</button>

<!-- ALT BAR (detay sayfasında) -->
<div class="bottom-bar" id="bottom-bar" style="display:none;">
  <button class="sorun-btn" onclick="sorunAc()" title="Sorun Bildir">!</button>
  <div class="miktar-ctrl">
    <button class="miktar-btn" onclick="changeMiktar(-1)">−</button>
    <span class="miktar-val" id="miktar-val">1</span>
    <button class="miktar-btn" onclick="changeMiktar(1)">+</button>
  </div>
  <button class="sepete-ekle-btn" id="sepete-ekle-btn" onclick="sepeteEkle()">Sepete Ekle</button>
</div>

<!-- SORUN MODAL -->
<div class="modal-overlay" id="sorun-modal">
  <div class="modal-box">
    <div class="modal-title">Sorun Bildir</div>
    <div class="modal-sub">Yaşadığınız sorunu yazın, garson ekranına iletilecek.</div>
    <textarea class="not-input" id="sorun-text" rows="4" placeholder="Örn: Menü yüklenmiyor..."></textarea>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="sorunKapat()">İptal</button>
      <button class="modal-send" onclick="sorunGonder()">Gönder</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, push, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const firebaseConfig = QR_MENU_CONFIG.firebase;

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const VARSAYILAN_KATEGORILER = [
    { id: 'dondurma', isim: 'Dondurma', emoji: '🍦' },
    { id: 'waffle', isim: 'Waffle', emoji: '🧇' },
    { id: 'magnolya', isim: 'Magnolya', emoji: '🌸' },
    { id: 'sansebastian', isim: 'San Sebastian', emoji: '🎂' },
    { id: 'donut', isim: 'Donut', emoji: '🍩' },
    { id: 'sufle', isim: 'Sufle', emoji: '🍮' },
    { id: 'brownie', isim: 'Brownie', emoji: '🍫' },
  ];

  let menuData = {};
  let kategoriler = [];
  let aktifKategori = null;
  let state = { urun: null, toplar: [], secimler: {}, miktar: 1 };
  let sepet = [];
  let TOP_FIYAT = QR_MENU_CONFIG.topFiyati || 80;

  // Top fiyatı config.js'den geliyor
  onValue(ref(db, 'ayarlar/topFiyat'), (snap) => { TOP_FIYAT = snap.val() ?? QR_MENU_CONFIG.topFiyati ?? 80; });

  // URL params
  const urlParams = new URLSearchParams(window.location.search);
  const masaUrl = urlParams.get('masa');
  const masaAdiUrl = urlParams.get('masaadi');
  const masaGoster = masaAdiUrl ? decodeURIComponent(masaAdiUrl) : (masaUrl ? 'Masa ' + masaUrl : null);
  if (masaUrl) {
    document.getElementById('masa-input').value = masaUrl;
    document.getElementById('masa-pill').textContent = masaGoster || 'Masa ' + masaUrl;
  }
  document.getElementById('masa-input').addEventListener('input', function() {
    document.getElementById('masa-pill').textContent = this.value ? 'Masa ' + this.value : '—';
  });

  // Tarayıcı geri butonu yönetimi
  history.pushState({ screen: 'home' }, '', '');
  window.addEventListener('popstate', (e) => {
    const screen = e.state?.screen || 'home';
    if (screen === 'home') {
      showScreenDirect('home');
    } else if (screen === 'detail') {
      showScreenDirect('detail');
    } else if (screen === 'sepet') {
      showScreenDirect('sepet');
    }
  });

  // Menü yükle
  onValue(ref(db, 'menu'), (snapshot) => {
    const data = snapshot.val() || {};
    menuData = data;
    kategoriler = data.kategoriler
      ? Object.values(data.kategoriler).sort((a, b) => (a.sira ?? 999) - (b.sira ?? 999))
      : VARSAYILAN_KATEGORILER;
    renderHome();
  });

  function renderHome() {
    const grid = document.getElementById('cat-grid');
    grid.innerHTML = kategoriler.map(k => {
      const foto = k.foto || '';
      return `<div class="cat-card" onclick="openKategori('${k.id}')">
        ${foto
          ? `<img src="${foto}" alt="${k.isim}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="cat-no-img" style="display:none"><span style="font-size:40px">${k.emoji||'🍦'}</span></div>`
          : `<div class="cat-no-img"><span style="font-size:40px">${k.emoji||'🍦'}</span></div>`
        }
        <div class="cat-label">${k.isim}</div>
      </div>`;
    }).join('');
  }

  window.openKategori = function(id) {
    aktifKategori = kategoriler.find(k => k.id === id);
    if (!aktifKategori) return;
    const data = menuData[id] || {};
    const tumUrunler = data.urunler ? Object.values(data.urunler) : [];
    const aktifUrunler = tumUrunler.filter(u => !u.pasif && (u.stok === undefined || u.stok > 0));
    const pasifUrunler = tumUrunler.filter(u => u.pasif || (u.stok !== undefined && u.stok <= 0));
    const bolumler = data.bolumler ? Object.entries(data.bolumler).sort((a,b) => (a[1].sira??999)-(b[1].sira??999)) : [];
    const topDestegi = data.topDestegi || false;

    document.getElementById('detail-title').textContent = aktifKategori.isim;
    state = { urun: null, toplar: [], secimler: {}, miktar: 1 };
    document.getElementById('miktar-val').textContent = '1';

    let html = '<div class="section">';

    if (topDestegi) {
      html += `<div class="section-title">Servis Şekli</div>`;
      html += `<div class="urun-grid">`;
      aktifUrunler.forEach(u => {
        html += `<div class="urun-card" id="uc-${u.id}" onclick="selectUrunTop('${u.id}')">
          <div class="urun-icon">${u.emoji||'🍦'}</div>
          <div class="urun-name">${u.isim}</div>
          ${u.fiyat > 0 ? `<div class="urun-price">${u.fiyat} ₺</div>` : ''}
        </div>`;
      });
      pasifUrunler.forEach(u => {
        html += `<div class="urun-card" style="opacity:0.4;cursor:not-allowed;filter:grayscale(1);">
          <div class="urun-icon">${u.emoji||'🍦'}</div>
          <div class="urun-name">${u.isim}</div>
          <div class="urun-price" style="color:#999;">Stokta yok</div>
        </div>`;
      });
      html += `</div>`;
      html += `<div id="top-secim-alani" style="display:none;"></div>`;
      html += `<div id="diger-bolumler" style="display:none;">`;
      bolumler.forEach(([bolumKey, bolum]) => {
        if (bolum.topIcinKullan) return;
        const secenekler = bolum.secenekler || [];
        const aktifler = secenekler.filter(s => !(typeof s==='object' ? s.pasif : false));
        const pasifler = secenekler.filter(s => (typeof s==='object' ? s.pasif : false));
        if (!secenekler.length) return;
        html += `<div class="section-title">${bolum.isim}</div><div class="chips">`;
        aktifler.forEach(s => {
          const isim = typeof s==='object' ? s.isim : s;
          const ekFiyat = typeof s==='object' && s.ekFiyat ? ` +${s.ekFiyat}₺` : '';
          html += `<span class="chip" onclick="toggleBolumChip(this,'${bolumKey}','${isim}',${typeof s==='object'&&s.ekFiyat?s.ekFiyat:0})">${isim}${ekFiyat}</span>`;
        });
        pasifler.forEach(s => {
          const isim = typeof s==='object' ? s.isim : s;
          html += `<span class="chip" style="opacity:0.4;cursor:not-allowed;filter:grayscale(1);">${isim}</span>`;
        });
        html += `</div>`;
      });
      html += `<div class="section-title">Özel Not</div>
        <textarea class="not-input" id="siparis-not" rows="2" placeholder="Örn: Az şekerli, alerji..."></textarea>
      </div>`;
    } else {
      html += `<div class="section-title">Ürünler</div>`;
      if (!tumUrunler.length) {
        html += '<p class="empty-msg">Henüz ürün eklenmedi</p>';
      } else {
        html += `<div class="urun-grid">`;
        aktifUrunler.forEach(u => {
          html += `<div class="urun-card" id="uc-${u.id}" onclick="selectUrun('${u.id}')">
            <div class="urun-icon">${u.emoji||'🍦'}</div>
            <div class="urun-name">${u.isim}</div>
            <div class="urun-price">${u.fiyat} ₺</div>
          </div>`;
        });
        pasifUrunler.forEach(u => {
          html += `<div class="urun-card" style="opacity:0.4;cursor:not-allowed;filter:grayscale(1);">
            <div class="urun-icon">${u.emoji||'🍦'}</div>
            <div class="urun-name">${u.isim}</div>
            <div class="urun-price" style="color:#999;">Stokta yok</div>
          </div>`;
        });
        html += `</div>`;
      }
      bolumler.forEach(([bolumKey, bolum]) => {
        const secenekler = bolum.secenekler || [];
        const aktifler = secenekler.filter(s => !(typeof s==='object' ? s.pasif : false));
        const pasifler = secenekler.filter(s => (typeof s==='object' ? s.pasif : false));
        if (!secenekler.length) return;
        html += `<div class="section-title">${bolum.isim}</div><div class="chips">`;
        aktifler.forEach(s => {
          const isim = typeof s==='object' ? s.isim : s;
          const ekFiyat = typeof s==='object' && s.ekFiyat ? ` +${s.ekFiyat}₺` : '';
          html += `<span class="chip" onclick="toggleBolumChip(this,'${bolumKey}','${isim}',${typeof s==='object'&&s.ekFiyat?s.ekFiyat:0})">${isim}${ekFiyat}</span>`;
        });
        pasifler.forEach(s => {
          const isim = typeof s==='object' ? s.isim : s;
          html += `<span class="chip" style="opacity:0.4;cursor:not-allowed;filter:grayscale(1);">${isim}</span>`;
        });
        html += `</div>`;
      });
      html += `<div class="section-title">Özel Not</div>
        <textarea class="not-input" id="siparis-not" rows="2" placeholder="Örn: Az şekerli, alerji..."></textarea>`;
    }

    html += `</div>`;
    document.getElementById('detail-content').innerHTML = html;
    if (topDestegi) renderTopAlani();
    showScreen('detail');
  };

  // TOP SIRALAMASI
  window.selectUrunTop = function(id) {
    const data = menuData[aktifKategori.id] || {};
    const urunler = data.urunler ? Object.values(data.urunler) : [];
    state.urun = state.urun === id ? null : id;
    state.toplar = [];
    urunler.forEach(u => {
      const el = document.getElementById('uc-' + u.id);
      if (el) el.classList.toggle('selected', u.id === state.urun);
    });
    const topAlani = document.getElementById('top-secim-alani');
    const digerBolumler = document.getElementById('diger-bolumler');
    if (state.urun) {
      topAlani.style.display = 'block';
      digerBolumler.style.display = 'block';
      renderTopAlani();
    } else {
      topAlani.style.display = 'none';
      digerBolumler.style.display = 'none';
    }
  };

  function renderTopAlani() {
    const alan = document.getElementById('top-secim-alani');
    if (!alan) return;
    const data = menuData[aktifKategori.id] || {};
    const bolumler = data.bolumler || {};
    const urunler2 = data.urunler ? Object.values(data.urunler) : [];
    const secilenUrun = urunler2.find(u => u.id === state.urun);
    const kulahFiyat = secilenUrun?.fiyat || 0;


    let tumSecenekler = [];
    let topBolumIsim = '';
    Object.values(bolumler).sort((a,b)=>(a.sira??999)-(b.sira??999)).forEach(bolum => {
      if (!bolum.topIcinKullan) return;
      if (!topBolumIsim) topBolumIsim = bolum.isim;
      (bolum.secenekler || []).forEach(s => {
        if (!(typeof s==='object' ? s.pasif : false))
          tumSecenekler.push(typeof s==='object' ? s : { isim: s, pasif: false });
      });
    });
    if (!tumSecenekler.length) {
      Object.values(bolumler).forEach(bolum => {
        if (!topBolumIsim) topBolumIsim = bolum.isim;
        (bolum.secenekler || []).forEach(s => {
          if (!(typeof s==='object' ? s.pasif : false))
            tumSecenekler.push(typeof s==='object' ? s : { isim: s, pasif: false });
        });
      });
    }
    const topBaslik = topBolumIsim || 'Top';
    const topSayisi = state.toplar.length;

    // Canlı fiyat hesapla
    let toplamFiyatGoster = kulahFiyat;
    state.toplar.forEach(t => {
      const sec = tumSecenekler.find(s => (typeof s==='object' ? s.isim : s) === t);
      toplamFiyatGoster += TOP_FIYAT + (typeof sec==='object' && sec.ekFiyat ? sec.ekFiyat : 0);
    });

    let ozet = '';
    if (topSayisi > 0) {
      ozet = `<div style="margin-bottom:1rem;">
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-style:italic;">Seçim sırasına göre aşağıdan yukarıya dizilir. Önce alta koymak istediğinizi seçin.</div>
        <div style="display:flex;flex-direction:column;gap:4px;">`;
      for (let i = topSayisi - 1; i >= 0; i--) {
        const sec = tumSecenekler.find(s => (typeof s==='object' ? s.isim : s) === state.toplar[i]);
        const ekF = typeof sec==='object' && sec.ekFiyat ? sec.ekFiyat : 0;
        ozet += `<div style="display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:10px;background:var(--warm);border:1px solid var(--soft);">
          <span style="font-size:11px;color:var(--muted);min-width:60px;font-weight:500;">${i+1}. ${topBaslik}</span>
          <span style="font-size:13px;font-weight:500;color:var(--brown);flex:1;">${state.toplar[i]}</span>
          <span style="font-size:12px;color:var(--accent);font-weight:600;">${TOP_FIYAT}${ekF ? ' +'+ekF : ''} ₺</span>
          <button onclick="topSil(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;">✕</button>
        </div>`;
      }
      ozet += `</div>
        <div style="text-align:right;margin-top:8px;font-size:14px;font-weight:600;color:var(--accent);">
          Toplam: ${toplamFiyatGoster} ₺
        </div>
      </div>`;
    }
    alan.innerHTML = `<div class="section" style="padding-bottom:0.5rem;">
      ${ozet}
      <div style="font-size:12px;color:var(--muted);margin-bottom:0.5rem;">Her top <b>${TOP_FIYAT} ₺</b>, aromalı toplar için ek ücret eklenir.</div>
      <div style="font-size:14px;font-weight:500;color:var(--brown);margin-bottom:0.6rem;">${topSayisi+1}. ${topBaslik} Seçin</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;">
        ${tumSecenekler.map(s => {
          const isim = typeof s==='object' ? s.isim : s;
          const ekF = typeof s==='object' && s.ekFiyat ? s.ekFiyat : 0;
          return `<span class="chip" onclick="topEkle('${isim}')">${isim}${ekF ? ` <span style="font-size:10px;color:var(--accent);">+${ekF}₺</span>` : ''}</span>`;
        }).join('')}
      </div>
    </div>`;
  }

  window.topEkle = function(isim) { state.toplar.push(isim); renderTopAlani(); document.getElementById('diger-bolumler').style.display='block'; };
  window.topSil = function(idx) { state.toplar.splice(idx,1); renderTopAlani(); };

  window.selectUrun = function(id) {
    const data = menuData[aktifKategori.id] || {};
    const urunler = data.urunler ? Object.values(data.urunler) : [];
    state.urun = state.urun === id ? null : id;
    urunler.forEach(u => {
      const el = document.getElementById('uc-' + u.id);
      if (el) el.classList.toggle('selected', u.id === state.urun);
    });
  };

  window.toggleBolumChip = function(el, bolumKey, val, ekFiyat) {
    el.classList.toggle('active');
    if (!state.secimler[bolumKey]) state.secimler[bolumKey] = [];
    const arr = state.secimler[bolumKey];
    const idx = arr.findIndex(s => s.isim === val);
    if (idx === -1) arr.push({ isim: val, ekFiyat: Number(ekFiyat)||0 });
    else arr.splice(idx, 1);
  };

  window.changeMiktar = function(d) {
    state.miktar = Math.max(1, state.miktar + d);
    document.getElementById('miktar-val').textContent = state.miktar;
  };

  // SEPETE EKLE
  window.sepeteEkle = function() {
    if (!aktifKategori) return;
    const data = menuData[aktifKategori.id] || {};
    const urunler = data.urunler ? Object.values(data.urunler) : [];
    const bolumler = data.bolumler || {};
    const topDestegi = data.topDestegi || false;

    let urunIsim, fiyat, topBilgi = null;

    if (topDestegi) {
      if (!state.urun) { showToast('Lütfen servis şekli seçin'); return; }
      if (state.toplar.length === 0) { showToast('En az 1 top seçin'); return; }
      const urun = urunler.find(u => u.id === state.urun);
  
      // Her top için 80₺ + varsa aroma ek ücreti
      const bolumlerObj = data.bolumler || {};
      let topToplamEkFiyat = 0;
      state.toplar.forEach(topIsim => {
        Object.values(bolumlerObj).forEach(bolum => {
          if (!bolum.topIcinKullan) return;
          const sec = (bolum.secenekler || []).find(s => (typeof s==='object' ? s.isim : s) === topIsim);
          if (sec && typeof sec==='object' && sec.ekFiyat) topToplamEkFiyat += sec.ekFiyat;
        });
      });
      const kulahFiyat = urun?.fiyat || 0;
      fiyat = kulahFiyat + (TOP_FIYAT * state.toplar.length) + topToplamEkFiyat;
      urunIsim = (urun?.isim || '') + ' — ' + state.toplar.join(' + ');
      topBilgi = [...state.toplar];
    } else {
      if (!state.urun) { showToast('Lütfen bir ürün seçin'); return; }
      const urun = urunler.find(u => u.id === state.urun);
      urunIsim = urun.isim;
      fiyat = urun.fiyat;
    }

    let ekFiyatToplam = 0;
    const secimMetni = Object.entries(state.secimler)
      .filter(([,arr]) => arr.length > 0)
      .map(([bolumKey, arr]) => {
        const bolumIsim = bolumler[bolumKey]?.isim || bolumKey;
        arr.forEach(s => { ekFiyatToplam += s.ekFiyat || 0; });
        return bolumIsim + ': ' + arr.map(s => s.isim + (s.ekFiyat ? ` +${s.ekFiyat}₺` : '')).join(', ');
      }).join(' | ');

    const not = document.getElementById('siparis-not')?.value?.trim() || '';
    const toplamFiyat = (fiyat + ekFiyatToplam) * state.miktar;

    sepet.push({
      kategori: aktifKategori.isim,
      urun: urunIsim,
      fiyat: fiyat + ekFiyatToplam,
      miktar: state.miktar,
      toplamFiyat,
      toplar: topBilgi,
      secimMetni,
      not
    });

    guncelleSepetFab();
    showToast(`✓ Sepete eklendi (${sepet.length} ürün)`);

    // State sıfırla
    state = { urun: null, toplar: [], secimler: {}, miktar: 1 };
    document.getElementById('miktar-val').textContent = '1';
    document.querySelectorAll('.urun-card').forEach(e => e.classList.remove('selected'));
    document.querySelectorAll('.chip').forEach(e => e.classList.remove('active'));
    if (document.getElementById('siparis-not')) document.getElementById('siparis-not').value = '';
    if (document.getElementById('top-secim-alani')) document.getElementById('top-secim-alani').style.display = 'none';
    if (document.getElementById('diger-bolumler')) document.getElementById('diger-bolumler').style.display = 'none';
  };

  function guncelleSepetFab() {
    const fab = document.getElementById('sepet-fab');
    const badge = document.getElementById('sepet-badge');
    if (sepet.length > 0) {
      fab.classList.add('visible');
      badge.textContent = sepet.length;
    } else {
      fab.classList.remove('visible');
    }
  }

  window.sepeteGit = function() { showScreen('sepet'); renderSepet(); };

  function renderSepet() {
    const icerik = document.getElementById('sepet-icerik');
    const toplam = document.getElementById('sepet-toplam');
    const toplamTutar = document.getElementById('sepet-toplam-tutar');

    if (!sepet.length) {
      icerik.innerHTML = `<div class="bos-sepet"><div class="bos-sepet-icon">🛒</div><p>Sepetiniz boş</p></div>`;
      toplam.style.display = 'none';
      return;
    }

    icerik.innerHTML = sepet.map((item, i) => `
      <div class="sepet-item">
        <div class="sepet-item-top">
          <div>
            <div class="sepet-item-isim">${item.kategori} — ${item.urun} × ${item.miktar}</div>
            ${item.secimMetni ? `<div class="sepet-item-detay">${item.secimMetni}</div>` : ''}
            ${item.not ? `<div class="sepet-item-detay" style="color:var(--accent);">Not: ${item.not}</div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
            <span class="sepet-item-fiyat">${item.toplamFiyat} ₺</span>
            <button class="sepet-sil-btn" onclick="sepettenSil(${i})">×</button>
          </div>
        </div>
      </div>
    `).join('');

    const genelToplam = sepet.reduce((s, item) => s + item.toplamFiyat, 0);
    toplam.style.display = 'flex';
    toplamTutar.textContent = genelToplam + ' ₺';
  }

  window.sepettenSil = function(idx) {
    sepet.splice(idx, 1);
    guncelleSepetFab();
    renderSepet();
  };

  // SİPARİŞ VER
  window.siparisVer = async function() {
    const masa = document.getElementById('masa-input').value;
    if (!masa) { showToast('Lütfen masa numarası girin'); return; }
    if (!sepet.length) { showToast('Sepetiniz boş'); return; }

    const btn = document.getElementById('siparis-ver-btn');
    btn.disabled = true;
    btn.textContent = 'Gönderiliyor...';

    const genelNot = document.getElementById('genel-not')?.value?.trim() || '';

    try {
      for (const item of sepet) {
        await push(ref(db, 'siparisler'), {
          masa: Number(masa),
          kategori: item.kategori,
          urun: item.urun,
          fiyat: item.fiyat,
          miktar: item.miktar,
          toplamFiyat: item.toplamFiyat,
          toplar: item.toplar || null,
          secimler: {},
          secimMetni: item.secimMetni || '',
          not: item.not || genelNot,
          durum: 'bekliyor',
          zaman: new Date().toISOString(),
          zamanStr: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })
        });
      }
      sepet = [];
      guncelleSepetFab();
      showToast('✓ Siparişiniz alındı!');
      showScreen('home');
      if (masaUrl) {
        document.getElementById('masa-input').value = masaUrl;
        document.getElementById('masa-pill').textContent = masaGoster || 'Masa ' + masaUrl;
      }
    } catch(e) { showToast('Hata oluştu, tekrar deneyin'); }

    btn.disabled = false;
    btn.textContent = 'Siparişi Tamamla';
  };

  // EKRAN YÖNETİMİ
  function showScreen(name) {
    showScreenDirect(name);
    history.pushState({ screen: name }, '', '');
    document.getElementById('bottom-bar').style.display = name === 'detail' ? 'flex' : 'none';
  }

  function showScreenDirect(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    document.getElementById('bottom-bar').style.display = name === 'detail' ? 'flex' : 'none';
    if (name === 'home') aktifKategori = null;
    if (name === 'sepet') renderSepet();
    window.scrollTo(0, 0);
  }

  window.goHome = function() { showScreen('home'); };

  // SORUN BİLDİR
  window.sorunAc = function() { document.getElementById('sorun-modal').classList.add('open'); };
  window.sorunKapat = function() { document.getElementById('sorun-modal').classList.remove('open'); document.getElementById('sorun-text').value = ''; };
  window.sorunGonder = async function() {
    const masa = document.getElementById('masa-input').value;
    const mesaj = document.getElementById('sorun-text').value.trim();
    if (!mesaj) { showToast('Lütfen sorunu yazın'); return; }
    try {
      await push(ref(db, 'siparisler'), {
        masa: masa ? Number(masa) : '?',
        kategori: 'Sorun Bildirimi',
        urun: mesaj,
        fiyat: 0, miktar: 1, toplamFiyat: 0,
        durum: 'bekliyor',
        zaman: new Date().toISOString(),
        zamanStr: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),
        sorunBildirimi: true
      });
      sorunKapat();
      showToast('Sorun bildirildi, teşekkürler!');
    } catch(e) { showToast('Gönderilemedi, tekrar deneyin'); }
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
